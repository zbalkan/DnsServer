<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <title>Technitium DNS Server</title>

    <!-- MudBlazor -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="_content/MudBlazor.Extensions/MudBlazor.Extensions.min.css" rel="stylesheet" />

    <!-- App styles -->
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="img/logo25x25.png" />
</head>
<body>
    <div id="app">
        <!-- Loading spinner shown while Blazor boots -->
        <div class="dns-splash">
            <img src="img/logo25x25.png" alt="Technitium" class="dns-splash-logo" />
            <div class="dns-splash-title">Technitium DNS Server</div>
            <div class="dns-splash-ring-wrap">
                <div class="dns-splash-ring"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/app.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_content/MudBlazor.Extensions/MudBlazor.Extensions.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
