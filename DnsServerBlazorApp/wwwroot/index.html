<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <title>Technitium DNS Server</title>

    <!-- MudBlazor fonts & icons -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="_content/MudBlazor.Extensions/MudBlazor.Extensions.min.css" rel="stylesheet" />

    <!-- App styles -->
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="img/logo25x25.png" />
</head>
<body>
    <div id="app">
        <!-- Loading spinner shown while Blazor boots -->
        <div style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Roboto, sans-serif;
            color: #6699ff;
        ">
            <img src="img/logo25x25.png" alt="Technitium" style="width:48px;height:48px;margin-bottom:16px;" />
            <div style="font-size:20px;font-weight:600;">Technitium DNS Server</div>
            <div style="margin-top:24px;">
                <div style="
                    width:40px;height:40px;
                    border:4px solid #e0e0e0;
                    border-top-color:#6699ff;
                    border-radius:50%;
                    animation: spin 0.8s linear infinite;
                "></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.dnsApp = {
            setBodyClass: function (cls, add) {
                if (add) document.body.classList.add(cls);
                else document.body.classList.remove(cls);
            }
        };
    </script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_content/MudBlazor.Extensions/MudBlazor.Extensions.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        #blazor-error-ui {
            background: lightyellow;
            bottom: 0; left: 0; right: 0;
            padding: 10px 15px;
            position: fixed;
            display: none;
            z-index: 1000;
        }
        #blazor-error-ui .dismiss { cursor: pointer; float: right; }
    </style>
</body>
</html>
